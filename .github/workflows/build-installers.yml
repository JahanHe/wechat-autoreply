name: Build installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify release readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundle
        run: npm run build-extension

      - name: Run non-UI gates
        run: |
          npm run test:baseline
          npm run test:desktop-modules
          npm run test:ai-knowledge
          npm run test:extension-modules
          npm run check:secrets
          npm run test:release-readiness

  build-mac:
    name: Build macOS installer
    runs-on: macos-15
    needs:
      - verify
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Check committed secrets
        run: npm run check:secrets

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundle
        run: npm run build-extension

      - name: Build macOS DMG
        run: npm run dist:mac -- --publish never

      - name: Smoke test macOS package
        run: bash scripts/test-macos-package.sh "$(find dist -maxdepth 1 -type f -name '*.dmg' | sort | tail -1)"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: xiaodian-ai-kefu-macos
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.blockmap

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    needs:
      - verify
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Check committed secrets
        run: npm run check:secrets

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundle
        run: npm run build-extension

      - name: Build Windows installer
        run: npm run dist:win -- --publish never

      - name: Smoke test Windows packages
        shell: powershell
        run: .\scripts\test-windows-packages.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: xiaodian-ai-kefu-windows
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download installer artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp release-artifacts/xiaodian-ai-kefu-macos/*.dmg release-assets/xiaodian-ai-kefu-macos-arm64.dmg
          cp release-artifacts/xiaodian-ai-kefu-windows/*Setup*.exe release-assets/xiaodian-ai-kefu-windows-setup.exe
          find release-artifacts/xiaodian-ai-kefu-windows -maxdepth 1 -type f -name '*.exe' ! -name '*Setup*' -exec cp {} release-assets/xiaodian-ai-kefu-windows-portable.exe \;
          test -f release-assets/xiaodian-ai-kefu-macos-arm64.dmg
          test -f release-assets/xiaodian-ai-kefu-windows-setup.exe
          test -f release-assets/xiaodian-ai-kefu-windows-portable.exe
          ls -lh release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_NOTES_SOURCE="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "${RELEASE_NOTES_SOURCE}" ]; then
            cp "${RELEASE_NOTES_SOURCE}" release-notes.md
          else
            cat > release-notes.md <<'EOF'
          # 小店AI客服

          > 正式桌面安装包。下载后只需要配置 DeepSeek API Key、企业微信机器人 Webhook，并完成微信小店客服扫码登录。

          ## 下载文件

          | 系统 | 文件 |
          | --- | --- |
          | macOS Apple Silicon | `xiaodian-ai-kefu-macos-arm64.dmg` |
          | Windows 安装版 | `xiaodian-ai-kefu-windows-setup.exe` |
          | Windows 便携版 | `xiaodian-ai-kefu-windows-portable.exe` |

          ## 内置能力

          - 默认文字回复规则、图文规则和回复图片。
          - 发商品卡片、邀请下单、悬浮窗设置页。
          - Webhook 异常通知、每小时总结、每日 10 点昨日总览。
          - 真实 API Key / Webhook 不会进入仓库或安装包。

          ## 文档

          - [README](https://github.com/JahanHe/Shop-ai-reply#readme)
          - [图文使用说明](https://github.com/JahanHe/Shop-ai-reply/blob/main/docs/rich-user-guide.md)
          EOF
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --title "小店AI客服 ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              --draft=false \
              --prerelease=false
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --title "小店AI客服 ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi
