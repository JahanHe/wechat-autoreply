name: Build installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS installer
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check committed secrets
        run: npm run check:secrets

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundle
        run: npm run build-extension

      - name: Build macOS DMG
        run: npm run dist:mac -- --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wechat-autoreply-macos
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.blockmap

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check committed secrets
        run: npm run check:secrets

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundle
        run: npm run build-extension

      - name: Build Windows installer
        run: npm run dist:win -- --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wechat-autoreply-windows
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-windows
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp release-artifacts/wechat-autoreply-macos/*.dmg release-assets/wechat-autoreply-macos-arm64.dmg
          cp release-artifacts/wechat-autoreply-windows/*Setup*.exe release-assets/wechat-autoreply-windows-setup.exe
          find release-artifacts/wechat-autoreply-windows -maxdepth 1 -type f -name '*.exe' ! -name '*Setup*' -exec cp {} release-assets/wechat-autoreply-windows-portable.exe \;
          test -f release-assets/wechat-autoreply-macos-arm64.dmg
          test -f release-assets/wechat-autoreply-windows-setup.exe
          test -f release-assets/wechat-autoreply-windows-portable.exe
          ls -lh release-assets

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --title "微信小店客服自动回复 ${GITHUB_REF_NAME}" \
            --notes "正式桌面安装包。

下载：
- macOS Apple Silicon：wechat-autoreply-macos-arm64.dmg
- Windows 安装版：wechat-autoreply-windows-setup.exe
- Windows 便携版：wechat-autoreply-windows-portable.exe

首次运行只需要配置：
1. DeepSeek API Key
2. 企业微信机器人 Webhook
3. 微信小店客服扫码登录

规则、图片、发商品、邀请下单、悬浮窗和 Webhook 汇总能力会自动初始化。"
