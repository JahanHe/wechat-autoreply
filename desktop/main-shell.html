<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小店AI客服控制台</title>
    <style>
      :root {
        color-scheme: light;
        --canvas: #faf9f5;
        --ink: #141413;
        --body: #3d3d3a;
        --muted: #6c6a64;
        --hairline: #e6dfd8;
        --card: #efe9de;
        --panel: #ffffff;
        --soft-panel: #f4eee5;
        --soft-panel-2: #f8f1e7;
        --primary: #cc785c;
        --primary-active: #a9583e;
        --success: #5db872;
        --warning: #d4a017;
        --error: #c64545;
        --radius: 8px;
        --control-radius: 8px;
        --sidebar: 236px;
        --contextbar: 54px;
        --detail: 340px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: var(--canvas);
        color: var(--ink);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
        letter-spacing: 0;
      }

      button {
        min-height: 36px;
        border: 1px solid var(--hairline);
        border-radius: var(--control-radius);
        background: #fff;
        color: var(--ink);
        cursor: pointer;
      }

      button:hover {
        border-color: #d6cbc0;
      }

      button.primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #fff;
      }

      button.primary:hover {
        background: var(--primary-active);
      }

      button.dark {
        border-color: #d8cbbf;
        background: var(--soft-panel);
        color: var(--ink);
      }

      button.danger {
        border-color: #e5b5ad;
        color: var(--error);
      }

      button:disabled,
      input:disabled,
      textarea:disabled,
      select:disabled {
        opacity: .58;
        cursor: default;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--hairline);
        border-radius: var(--control-radius);
        background: #fff;
        color: var(--ink);
        outline: none;
      }

      input,
      select {
        min-height: 38px;
        padding: 0 10px;
      }

      textarea {
        min-height: 88px;
        padding: 10px;
        resize: vertical;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(204, 120, 92, .15);
      }

      .app {
        display: grid;
        grid-template-columns: var(--sidebar) minmax(0, 1fr);
        width: 100vw;
        height: 100vh;
      }

      .sidebar {
        height: 100vh;
        background: rgba(255, 255, 255, .72);
        color: var(--ink);
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--hairline);
        z-index: 5;
      }

      .brand {
        padding: 14px 16px 12px;
        display: grid;
        grid-template-columns: 34px 42px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
      }

      .menu-button {
        width: 34px;
        height: 34px;
        min-height: 34px;
        display: inline-grid;
        place-items: center;
        padding: 0;
        border-color: var(--hairline);
        background: #fff;
      }

      .menu-button span {
        display: block;
        width: 16px;
        height: 2px;
        margin: 2px 0;
        border-radius: 999px;
        background: var(--ink);
      }

      .menu-button.active {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(204, 120, 92, .12);
      }

      .platform-darwin .menu-button {
        display: none;
      }

      .platform-darwin .brand {
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 12px;
      }

      .platform-darwin .sidebar {
        padding-top: 38px;
      }

      .brand img {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        object-fit: contain;
        background: var(--card);
      }

      .brand h1 {
        margin: 0;
        font-size: 15px;
        line-height: 1.25;
        font-weight: 720;
      }

      .brand p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .desktop-menu {
        position: fixed;
        top: 58px;
        left: 12px;
        z-index: 60;
        width: min(340px, calc(100vw - 24px));
        max-height: calc(100vh - 76px);
        overflow: auto;
        display: none;
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        background: #fff;
        box-shadow: 0 24px 60px rgba(20, 20, 19, .18);
        padding: 8px;
      }

      .desktop-menu.open {
        display: grid;
        gap: 6px;
      }

      .menu-section {
        border: 1px solid var(--hairline);
        border-radius: var(--control-radius);
        overflow: hidden;
        background: var(--soft-panel-2);
      }

      .menu-section summary {
        min-height: 36px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 0 10px;
        cursor: pointer;
        font-weight: 700;
      }

      .menu-section summary::after {
        content: ">";
        color: var(--muted);
      }

      .menu-items {
        display: grid;
        gap: 2px;
        padding: 6px;
        border-top: 1px solid var(--hairline);
        background: #fff;
      }

      .menu-command {
        width: 100%;
        min-height: 34px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 0 8px;
        border-color: transparent;
        background: transparent;
        text-align: left;
      }

      .menu-command:hover {
        border-color: #ead8cd;
        background: #fff5ef;
      }

      .menu-command:disabled {
        opacity: .42;
      }

      .menu-command.danger {
        color: var(--error);
      }

      .menu-check {
        color: var(--primary);
        font-weight: 800;
      }

      .menu-accelerator {
        color: var(--muted);
        font-size: 11px;
      }

      .menu-separator {
        height: 1px;
        margin: 4px 2px;
        background: var(--hairline);
      }

      .status-strip {
        padding: 0 14px 12px;
        display: grid;
        gap: 8px;
      }

      .mini-status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 30px;
        padding: 0 9px;
        border: 1px solid var(--hairline);
        border-radius: var(--control-radius);
        background: var(--soft-panel-2);
        color: var(--body);
        font-size: 12px;
      }

      .signal {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--success);
        flex: none;
      }

      .dot.warn {
        background: var(--warning);
      }

      .dot.bad {
        background: var(--error);
      }

      .dot.active {
        background: #3b82c4;
      }

      .nav {
        padding: 6px 10px 10px;
        display: grid;
        gap: 4px;
      }

      .nav button {
        width: 100%;
        display: grid;
        grid-template-columns: 22px minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        min-height: 46px;
        padding: 6px 10px;
        border-color: transparent;
        background: transparent;
        color: var(--body);
        text-align: left;
      }

      .nav-icon {
        width: 18px;
        height: 18px;
        color: var(--muted);
      }

      .nav-icon svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .nav-copy {
        min-width: 0;
        display: grid;
        gap: 1px;
      }

      .nav-title {
        overflow: hidden;
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-desc {
        display: none;
        overflow: hidden;
        color: var(--muted);
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav button:hover .nav-desc,
      .nav button.active .nav-desc {
        display: block;
      }

      .nav button.active {
        border-color: #ead8cd;
        background: #fff5ef;
        color: var(--ink);
      }

      .nav button.active .nav-icon {
        color: var(--primary);
      }

      .nav small {
        color: inherit;
        opacity: .65;
      }

      .side-actions {
        margin-top: auto;
        padding: 12px;
        border-top: 1px solid var(--hairline);
        display: grid;
        gap: 8px;
      }

      .side-actions .two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .side-actions button {
        border-color: var(--hairline);
        background: #fff;
        color: var(--ink);
      }

      .side-actions button.primary {
        border-color: var(--primary);
        background: var(--primary);
      }

      .workspace {
        position: relative;
        min-width: 0;
        height: 100vh;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .context-bar {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: var(--contextbar);
        padding: 10px 18px;
        border-bottom: 1px solid var(--hairline);
        background: rgba(250, 249, 245, .94);
      }

      .context-title {
        min-width: 0;
        display: grid;
        gap: 2px;
      }

      .context-title strong,
      .context-title span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .context-title span {
        color: var(--muted);
        font-size: 12px;
      }

      .workspace-body {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) var(--detail);
        overflow: hidden;
      }

      .content {
        height: 100%;
        overflow: auto;
        padding: 22px 28px 32px;
      }

      .detail-panel {
        min-width: 0;
        height: 100%;
        overflow: auto;
        border-left: 1px solid var(--hairline);
        background: rgba(255, 255, 255, .78);
        padding: 18px;
      }

      .detail-panel h3 {
        margin: 0 0 8px;
        font-size: 15px;
      }

      .detail-panel .detail-block {
        display: grid;
        gap: 8px;
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        background: #fff;
        padding: 12px;
        margin-top: 12px;
      }

      .page-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 18px;
        margin-bottom: 18px;
      }

      .section-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 6px;
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, .68);
      }

      .section-tabs button {
        min-height: 32px;
        padding: 0 12px;
        border-color: transparent;
        background: transparent;
        color: var(--muted);
      }

      .section-tabs button.active {
        border-color: #ead8cd;
        background: #fff5ef;
        color: var(--ink);
      }

      .page-head h2 {
        margin: 0;
        font-size: 25px;
        line-height: 1.2;
      }

      .page-head p {
        margin: 6px 0 0;
        color: var(--muted);
        max-width: 760px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .grid.cols-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid.cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid.cols-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .grid > .span-2 {
        grid-column: 1 / -1;
      }

      .card {
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, .74);
        padding: 16px;
      }

      .card.cream {
        background: var(--card);
      }

      .card.dark {
        border-color: var(--hairline);
        background: var(--soft-panel);
        color: var(--ink);
      }

      .card h3 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      .section-title {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .section-title h3 {
        margin-bottom: 4px;
      }

      .metric {
        display: grid;
        gap: 8px;
        min-width: 0;
      }

      .metric strong {
        font-size: 30px;
        line-height: 1;
      }

      .metric span,
      .muted,
      .hint {
        color: var(--muted);
      }

      .metric span {
        min-width: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .runyu-monitor .switch-row {
        border: 0;
        border-top: 1px solid var(--hairline);
        border-radius: 0;
        background: transparent;
        padding: 9px 0;
      }

      .runyu-monitor .switch-row:first-child {
        border-top: 0;
      }

      .runtime-trail {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .runtime-step {
        min-width: 0;
        display: grid;
        grid-template-columns: 10px minmax(0, 1fr);
        gap: 7px;
        align-items: center;
        border: 1px solid var(--hairline);
        border-radius: var(--control-radius);
        background: #fff;
        padding: 8px;
      }

      .runtime-step div {
        min-width: 0;
      }

      .runtime-step strong,
      .runtime-step span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .runtime-step span {
        color: var(--muted);
        font-size: 11px;
      }

      .runtime-current {
        display: grid;
        grid-template-columns: 12px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--hairline);
        border-radius: var(--control-radius);
        background: #fff;
        padding: 12px;
      }

      .runtime-current div {
        min-width: 0;
      }

      .runtime-current strong,
      .runtime-current span {
        display: block;
      }

      .runtime-current span,
      .runtime-current time {
        color: var(--muted);
        font-size: 12px;
      }

      .dark .muted,
      .dark .hint {
        color: var(--muted);
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field label {
        font-size: 13px;
        font-weight: 650;
      }

      .hint {
        font-size: 12px;
      }

      .path-control {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 8px;
        align-items: center;
      }

      .path-control button {
        min-width: 92px;
        padding: 0 10px;
        white-space: nowrap;
      }

      .action-module {
        display: grid;
        gap: 12px;
        border: 1px solid var(--hairline);
        border-left: 3px solid var(--primary);
        border-radius: var(--radius);
        background: #fff;
        padding: 12px;
      }

      .action-module-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .action-module-head > div {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .action-note {
        border: 1px solid var(--hairline);
        border-radius: var(--control-radius);
        background: var(--surface-soft);
        padding: 12px;
        color: var(--muted);
      }

      .image-preview {
        display: grid;
        grid-template-columns: 160px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
      }

      .image-preview-frame {
        width: 160px;
        height: 104px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid var(--hairline);
        border-radius: var(--control-radius);
        background: #f8f7f4;
        color: var(--muted);
        text-align: center;
      }

      .image-preview-frame img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .image-preview-meta {
        overflow-wrap: anywhere;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .form-grid .span-2 {
        grid-column: 1 / -1;
      }

      .switch-row,
      .log-row,
      .rule-card {
        display: grid;
        gap: 8px;
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        background: #fff;
        padding: 12px;
      }

      .switch-row {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
      }

      .switch-row strong {
        display: block;
      }

      .toggle {
        width: 46px;
        height: 26px;
        border: 1px solid #d6cbc0;
        border-radius: 999px;
        background: #e9e0d4;
        padding: 2px;
        transition: .18s;
      }

      .toggle::before {
        content: "";
        display: block;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 4px rgba(20, 20, 19, .2);
        transition: .18s;
      }

      .toggle.on {
        border-color: var(--primary);
        background: var(--primary);
      }

      .toggle.on::before {
        transform: translateX(20px);
      }

      input[type="checkbox"] {
        appearance: none;
        width: 46px;
        min-width: 46px;
        max-width: 46px;
        height: 26px;
        min-height: 26px;
        max-height: 26px;
        border: 1px solid #d6cbc0;
        border-radius: 999px;
        background: #e9e0d4;
        padding: 2px;
        position: relative;
        cursor: pointer;
        transition: .18s;
        justify-self: end;
        flex: 0 0 46px;
      }

      input[type="checkbox"]::before {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 4px rgba(20, 20, 19, .2);
        transition: .18s;
      }

      input[type="checkbox"]:checked {
        border-color: var(--primary);
        background: var(--primary);
      }

      input[type="checkbox"]:checked::before {
        transform: translateX(20px);
      }

      .badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 8px;
        border-radius: 999px;
        border: 1px solid var(--hairline);
        background: #fff;
        color: var(--body);
        font-size: 12px;
      }

      .badge.rule {
        border-color: #dec0af;
        background: #fff1ea;
        color: #8f4e38;
      }

      .badge.direct {
        border-color: #c9d8b7;
        background: #f0f7e8;
        color: #46642b;
      }

      .badge.ai {
        border-color: #c7c3da;
        background: #f1eef8;
        color: #514477;
      }

      .badge.judgment {
        border-color: #b8d3cf;
        background: #eef8f5;
        color: #2f6b62;
      }

      .badge.fail {
        border-color: #efc3bd;
        background: #fff0ee;
        color: var(--error);
      }

      .choice-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .choice {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
        align-items: center;
        min-height: 38px;
        border: 1px solid var(--hairline);
        border-radius: var(--control-radius);
        background: #fff;
        padding: 6px 8px;
      }

      .choice input[type="checkbox"] {
        width: 18px;
        min-width: 18px;
        max-width: 18px;
        height: 18px;
        min-height: 18px;
        max-height: 18px;
        padding: 0;
        border-radius: 5px;
        justify-self: start;
      }

      .choice input[type="checkbox"]::before {
        display: none;
      }

      .choice input[type="checkbox"]:checked {
        background: var(--primary);
      }

      .choice span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .download-panel {
        display: grid;
        gap: 8px;
        margin-top: 12px;
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        background: #fff;
        padding: 12px;
      }

      .download-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--ink);
      }

      .progress {
        height: 9px;
        overflow: hidden;
        border-radius: 999px;
        background: #eadfd4;
      }

      .progress span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--primary);
        transition: width .2s ease;
      }

      .judgment-results {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .judgment-item {
        display: grid;
        gap: 6px;
        border: 1px solid var(--hairline);
        border-radius: var(--control-radius);
        background: #fff;
        padding: 10px;
      }

      .judgment-item div {
        color: var(--body);
        font-size: 13px;
        max-height: 86px;
        overflow: auto;
      }

      .error-text {
        color: var(--error);
      }

      .rule-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .rule-title {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .rule-title strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rule-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .rule-editor {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .rule-editor .span-2 {
        grid-column: 1 / -1;
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .tabs button {
        min-height: 34px;
        padding: 0 12px;
      }

      .tabs button.active {
        border-color: var(--primary);
        background: #fff5ef;
        color: var(--primary-active);
      }

      .log-row {
        grid-template-columns: 160px minmax(0, 1fr) minmax(0, 1.2fr);
        align-items: start;
      }

      .log-time {
        color: var(--muted);
        font-size: 12px;
      }

      .log-trace-badges {
        margin-top: 9px;
      }

      .process-chain {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 9px;
      }

      .process-chain span {
        border-left: 2px solid var(--primary);
        background: var(--soft-panel-2);
        padding: 4px 7px;
        color: var(--body);
        font-size: 11px;
      }

      .rule-test-panel {
        margin: 12px 0 14px;
      }

      .rule-test-result {
        margin-top: 8px;
      }

      .rule-test-results {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .readonly-box {
        min-height: 38px;
        border: 1px solid var(--hairline);
        border-radius: var(--control-radius);
        background: #fff;
        padding: 9px 10px;
        white-space: pre-wrap;
        color: var(--body);
      }

      .fail-text {
        margin-top: 7px;
        color: var(--error);
      }

      .empty {
        border: 1px dashed #d9cfc3;
        border-radius: var(--radius);
        padding: 24px;
        color: var(--muted);
        text-align: center;
      }

      .flash {
        position: fixed;
        right: 20px;
        bottom: 18px;
        z-index: 20;
        max-width: 420px;
        padding: 11px 13px;
        border-radius: var(--control-radius);
        background: #fff5ef;
        color: var(--ink);
        border: 1px solid #ead8cd;
        box-shadow: 0 12px 36px rgba(20, 20, 19, .2);
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition: .18s;
      }

      .flash.show {
        opacity: 1;
        transform: translateY(0);
      }

      .flash.ok {
        background: #ecf7ee;
        color: #2f7d43;
      }

      .flash.error {
        background: var(--error);
      }

      .page-placeholder {
        height: 100%;
        display: grid;
        align-items: end;
        padding: 24px;
        background: var(--canvas);
      }

      .page-placeholder .card {
        max-width: 520px;
      }

      details:not(.menu-section) {
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        background: #fff;
        padding: 10px 12px;
      }

      details:not(.menu-section) summary {
        cursor: pointer;
        font-weight: 650;
      }

      code {
        border-radius: 6px;
        background: #f4eee5;
        padding: 1px 5px;
      }

      @media (max-width: 1180px) {
        :root {
          --sidebar: 84px;
          --detail: 0px;
        }

        .brand {
          grid-template-columns: 34px;
          justify-content: center;
        }

        .brand div,
        .status-strip,
        .nav-copy,
        .nav small {
          display: none;
        }

        .brand img {
          display: none;
        }

        .platform-darwin .brand {
          grid-template-columns: 42px;
        }

        .platform-darwin .brand img {
          display: block;
        }

        .nav button {
          grid-template-columns: 1fr;
          justify-items: center;
        }

        .workspace-body {
          grid-template-columns: 1fr;
        }

        .detail-panel {
          position: fixed;
          right: 16px;
          top: 88px;
          bottom: 16px;
          z-index: 30;
          width: min(360px, calc(100vw - 116px));
          display: none;
          box-shadow: 0 20px 48px rgba(20, 20, 19, .18);
        }

        .detail-panel.open {
          display: block;
        }

        .grid.cols-3,
        .grid.cols-4,
        .grid.cols-2,
        .form-grid,
        .rule-editor,
        .log-row {
          grid-template-columns: 1fr;
        }

        .form-grid .span-2,
        .rule-editor .span-2,
        .grid > .span-2 {
          grid-column: auto;
        }

        .path-control {
          grid-template-columns: 1fr;
        }

        .choice-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <button id="desktopMenuButton" class="menu-button" type="button" title="打开菜单" aria-label="打开菜单" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <img src="assets/logo.png" alt="">
          <div>
            <h1>小店AI客服控制台</h1>
            <p id="pageMini">客服页映射</p>
          </div>
        </div>
        <div id="desktopMenu" class="desktop-menu" aria-label="全局菜单"></div>

        <div class="status-strip">
          <div class="mini-status">
            <span class="signal"><i id="botDot" class="dot"></i><span id="botMini">Bot</span></span>
            <span id="botModeMini">开启</span>
          </div>
          <div class="mini-status">
            <span class="signal"><i id="aiDot" class="dot warn"></i><span id="aiMini">AI</span></span>
            <span id="notifyMini">通知</span>
          </div>
        </div>

        <nav id="nav" class="nav" aria-label="控制台导航"></nav>
      </aside>

      <section class="workspace">
        <div id="contextBar" class="context-bar" aria-label="页面上下文"></div>
        <div class="workspace-body">
          <main id="content" class="content" aria-live="polite"></main>
          <aside id="detailPanel" class="detail-panel" aria-label="详情面板"></aside>
        </div>
      </section>
    </div>

    <div id="flash" class="flash"></div>
    <script src="./main-shell.js"></script>
  </body>
</html>
