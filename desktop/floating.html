<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小店AI客服状态</title>
    <style>
      :root {
        color-scheme: light;
        --canvas: rgba(252, 251, 248, .98);
        --surface: #ffffff;
        --surface-soft: #f7f4ef;
        --ink: #141413;
        --body: #3d3d3a;
        --muted: #6c6a64;
        --hairline: #e6dfd8;
        --primary: #cc785c;
        --primary-active: #a9583e;
        --success: #5db872;
        --warning: #d4a017;
        --error: #c64545;
        --radius: 8px;
        --control-radius: 7px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: transparent;
        color: var(--ink);
        font: 12px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        user-select: none;
      }

      button {
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        letter-spacing: 0;
        cursor: pointer;
      }

      .window {
        width: 100vw;
        height: 100vh;
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        background: var(--canvas);
        box-shadow: 0 18px 44px rgba(24, 23, 21, .18);
        overflow: hidden;
      }

      .full {
        height: 100%;
        display: grid;
        grid-template-rows: 46px 64px 68px 50px 28px;
      }

      .top {
        -webkit-app-region: drag;
      }

      .top {
        min-height: 46px;
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 7px 10px;
        border-bottom: 1px solid rgba(230, 223, 216, .8);
      }

      .logo {
        width: 28px;
        height: 28px;
        object-fit: contain;
      }

      .title {
        min-width: 0;
      }

      .title strong {
        display: block;
        overflow: hidden;
        color: var(--ink);
        font-size: 13px;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .title span,
      .meta {
        color: var(--muted);
        font-size: 11px;
      }

      .title-meta {
        display: flex;
        gap: 7px;
        align-items: center;
      }

      .live-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--success);
      }

      .window-actions {
        display: flex;
        gap: 4px;
        -webkit-app-region: no-drag;
      }

      .icon-button {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        border-radius: 7px;
        color: var(--muted);
      }

      .icon-button:hover {
        background: #f3ece3;
        color: var(--ink);
      }

      .icon-button.close:hover {
        background: #f9e1dc;
        color: var(--error);
      }

      .status-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        padding: 7px 10px;
        border-bottom: 1px solid rgba(230, 223, 216, .7);
      }

      .status-row {
        min-width: 0;
        display: grid;
        grid-template-columns: 10px 32px minmax(0, 1fr);
        gap: 5px;
        align-items: center;
        min-height: 24px;
        padding: 4px 2px;
      }

      .lamp {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #c8c1b8;
        box-shadow: 0 0 0 3px rgba(200, 193, 184, .16);
      }

      .lamp.ok {
        background: var(--success);
        box-shadow: 0 0 0 3px rgba(93, 184, 114, .18);
      }

      .lamp.warn {
        background: var(--warning);
        box-shadow: 0 0 0 3px rgba(212, 160, 23, .18);
      }

      .lamp.active {
        background: #3b82c4;
        box-shadow: 0 0 0 3px rgba(59, 130, 196, .18);
      }

      .lamp.bad {
        background: var(--error);
        box-shadow: 0 0 0 3px rgba(198, 69, 69, .18);
      }

      .label {
        color: var(--body);
        font-weight: 650;
      }

      .value {
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .process {
        min-width: 0;
        display: grid;
        grid-template-columns: 14px minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        padding: 8px 12px;
        background: var(--surface);
        border-bottom: 1px solid rgba(230, 223, 216, .7);
      }

      .process .lamp {
        width: 11px;
        height: 11px;
        margin-top: 5px;
      }

      .process-copy {
        min-width: 0;
        display: grid;
        gap: 3px;
      }

      .process-heading {
        min-width: 0;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .process-label {
        color: var(--ink);
        overflow: hidden;
        font-size: 15px;
        font-weight: 750;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .process-category {
        flex: 0 0 auto;
        padding: 0;
        color: var(--muted);
        font-size: 10px;
        white-space: nowrap;
      }

      .process-category::before {
        content: "· ";
      }

      .process-detail {
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .footer {
        min-height: 28px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        padding: 4px 10px 6px;
        color: var(--muted);
        border-top: 1px solid rgba(230, 223, 216, .7);
        font-size: 11px;
      }

      .command-bar {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        align-items: center;
        padding: 7px 10px;
        background: var(--canvas);
        border-bottom: 1px solid rgba(230, 223, 216, .7);
      }

      .command-button {
        min-width: 0;
        height: 34px;
        border: 1px solid #dfd4ca;
        border-radius: var(--control-radius);
        background: #fff;
        padding: 0 6px;
        color: var(--body);
        font-weight: 650;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        -webkit-app-region: no-drag;
      }

      .command-button:hover {
        border-color: var(--primary);
        background: #fff5ef;
        color: var(--primary-active);
      }

      .command-button.primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #fff;
      }

      .command-button.warn {
        border-color: #ead5a0;
        background: #fff8e7;
        color: #8c6612;
      }
    </style>
  </head>
  <body>
    <div class="window">
      <section class="full" aria-label="小店AI客服状态悬浮窗">
        <header class="top">
          <img class="logo" src="assets/logo.png" alt="">
          <div class="title">
            <strong>小店AI客服</strong>
            <div class="title-meta"><i class="live-dot"></i><span id="liveClock">--:--:--</span></div>
          </div>
          <div class="window-actions">
            <button id="closeFloat" class="icon-button close" type="button" title="关闭悬浮窗" aria-label="关闭悬浮窗">×</button>
          </div>
        </header>

        <div class="process">
          <i id="runtimeLamp" class="lamp active"></i>
          <div class="process-copy">
            <div class="process-heading">
              <strong id="runtimeLabel" class="process-label">启动中</strong>
              <span id="runtimeCategory" class="process-category">系统</span>
            </div>
            <span id="runtimeDetail" class="process-detail">正在启动客服自动回复服务</span>
          </div>
        </div>

        <div class="status-list" aria-label="运行状态，仅供查看">
          <div class="status-row">
            <i id="aiLamp" class="lamp"></i>
            <span class="label">AI</span>
            <span id="aiText" class="value">检查中</span>
          </div>
          <div class="status-row">
            <i id="localLamp" class="lamp"></i>
            <span class="label">本地</span>
            <span id="localText" class="value">连接中</span>
          </div>
          <div class="status-row">
            <i id="scriptLamp" class="lamp"></i>
            <span class="label">脚本</span>
            <span id="scriptText" class="value">等待状态</span>
          </div>
          <div class="status-row">
            <i id="loginLamp" class="lamp"></i>
            <span class="label">登录</span>
            <span id="loginText" class="value">检查中</span>
          </div>
        </div>

        <div class="command-bar" aria-label="可点击操作">
          <button id="openMain" class="command-button primary" type="button">打开控制台</button>
          <button id="toggleBot" class="command-button" type="button">暂停 Bot</button>
        </div>

        <footer class="footer">
          <span id="botMode" class="meta">Bot 正在接管</span>
          <span id="updatedAt" class="meta">状态刚刚更新</span>
        </footer>
      </section>

    </div>

    <script src="floating.js"></script>
  </body>
</html>
