<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>客服状态</title>
    <style>
      :root {
        color-scheme: light;
        --canvas: rgba(250, 249, 245, .96);
        --ink: #141413;
        --body: #3d3d3a;
        --muted: #6c6a64;
        --hairline: #e6dfd8;
        --primary: #cc785c;
        --primary-active: #a9583e;
        --success: #5db872;
        --warning: #d4a017;
        --error: #c64545;
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: transparent;
        color: var(--ink);
        font: 12px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        user-select: none;
      }

      button {
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        letter-spacing: 0;
        cursor: pointer;
      }

      .window {
        width: 100vw;
        height: 100vh;
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        background: var(--canvas);
        box-shadow: 0 18px 44px rgba(24, 23, 21, .18);
        overflow: hidden;
      }

      .full {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .top,
      .mini-strip {
        -webkit-app-region: drag;
      }

      .top {
        min-height: 42px;
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 7px 10px 6px;
        border-bottom: 1px solid rgba(230, 223, 216, .8);
      }

      .logo {
        width: 28px;
        height: 28px;
        object-fit: contain;
      }

      .title {
        min-width: 0;
      }

      .title strong,
      .mini-title {
        display: block;
        overflow: hidden;
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .title span,
      .mini-subtitle,
      .meta {
        color: var(--muted);
        font-size: 11px;
      }

      .window-actions,
      .mini-actions {
        display: flex;
        gap: 4px;
        -webkit-app-region: no-drag;
      }

      .icon-button {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        border-radius: 7px;
        color: var(--muted);
      }

      .icon-button:hover {
        background: #f3ece3;
        color: var(--ink);
      }

      .icon-button.close:hover {
        background: #f9e1dc;
        color: var(--error);
      }

      .status-list {
        display: grid;
        gap: 5px;
        padding: 8px 10px;
      }

      .status-row {
        min-width: 0;
        display: grid;
        grid-template-columns: 12px 54px minmax(0, 1fr);
        gap: 7px;
        align-items: center;
        min-height: 15px;
      }

      .lamp {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #c8c1b8;
        box-shadow: 0 0 0 3px rgba(200, 193, 184, .16);
      }

      .lamp.ok {
        background: var(--success);
        box-shadow: 0 0 0 3px rgba(93, 184, 114, .18);
      }

      .lamp.warn {
        background: var(--warning);
        box-shadow: 0 0 0 3px rgba(212, 160, 23, .18);
      }

      .lamp.bad {
        background: var(--error);
        box-shadow: 0 0 0 3px rgba(198, 69, 69, .18);
      }

      .label {
        color: var(--body);
        font-weight: 650;
      }

      .value {
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .footer {
        min-height: 26px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        padding: 5px 10px 7px;
        color: var(--muted);
        border-top: 1px solid rgba(230, 223, 216, .7);
        font-size: 11px;
      }

      .mode-pill {
        max-width: 146px;
        overflow: hidden;
        border: 1px solid #ead8cd;
        border-radius: 999px;
        padding: 2px 7px;
        color: var(--primary-active);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mini-strip {
        display: none;
        height: 100%;
        grid-template-columns: 12px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 6px 8px 6px 10px;
      }

      .mini-copy {
        min-width: 0;
        display: flex;
        align-items: center;
        overflow: hidden;
      }

      .mini-title {
        line-height: 1;
      }

      .mini-subtitle {
        display: none;
      }

      body.mini .full {
        display: none;
      }

      body.mini .mini-strip {
        display: grid;
      }
    </style>
  </head>
  <body>
    <div class="window">
      <section class="full" aria-label="客服状态悬浮窗">
        <header class="top">
          <img class="logo" src="assets/logo.png" alt="">
          <div class="title">
            <strong>客服状态</strong>
            <span id="summaryText">正在连接</span>
          </div>
          <div class="window-actions">
            <button id="minimizeFloat" class="icon-button" type="button" title="最小化" aria-label="最小化">−</button>
            <button id="closeFloat" class="icon-button close" type="button" title="关闭悬浮窗" aria-label="关闭悬浮窗">×</button>
          </div>
        </header>

        <div class="status-list">
          <div class="status-row">
            <i id="aiLamp" class="lamp"></i>
            <span class="label">AI</span>
            <span id="aiText" class="value">检查中</span>
          </div>
          <div class="status-row">
            <i id="localLamp" class="lamp"></i>
            <span class="label">本地</span>
            <span id="localText" class="value">连接中</span>
          </div>
          <div class="status-row">
            <i id="scriptLamp" class="lamp"></i>
            <span class="label">脚本</span>
            <span id="scriptText" class="value">等待状态</span>
          </div>
          <div class="status-row">
            <i id="loginLamp" class="lamp"></i>
            <span class="label">登录</span>
            <span id="loginText" class="value">检查中</span>
          </div>
        </div>

        <footer class="footer">
          <span id="botMode" class="mode-pill">Bot 接管开启</span>
          <span id="updatedAt" class="meta">--:--:--</span>
        </footer>
      </section>

      <section class="mini-strip" aria-label="最小化客服状态">
        <i id="miniLamp" class="lamp"></i>
        <div class="mini-copy">
          <strong id="miniTitle" class="mini-title">客服状态</strong>
          <span id="miniSubtitle" class="mini-subtitle">正在连接</span>
        </div>
        <div class="mini-actions">
          <button id="expandFloat" class="icon-button" type="button" title="展开" aria-label="展开">□</button>
          <button id="closeMiniFloat" class="icon-button close" type="button" title="关闭悬浮窗" aria-label="关闭悬浮窗">×</button>
        </div>
      </section>
    </div>

    <script src="floating.js"></script>
  </body>
</html>
