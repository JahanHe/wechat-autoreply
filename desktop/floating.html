<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小店AI客服状态</title>
    <style>
      :root {
        color-scheme: light;
        --canvas: #fbfaf7;
        --surface: #ffffff;
        --surface-soft: #f5efe8;
        --ink: #171614;
        --body: #403d38;
        --muted: #746f67;
        --hairline: #e5ddd3;
        --primary: #cc785c;
        --primary-active: #a85b43;
        --success: #4ea867;
        --warning: #c99218;
        --error: #c84d43;
        --active: #3d7cb8;
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: transparent;
        color: var(--ink);
        font: 12px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        user-select: none;
      }

      button {
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        letter-spacing: 0;
        cursor: pointer;
      }

      .window {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        border: 1px solid rgba(229, 221, 211, .95);
        border-radius: var(--radius);
        background: var(--canvas);
        box-shadow: 0 18px 44px rgba(24, 23, 21, .18);
      }

      .full {
        height: 100%;
        display: grid;
        grid-template-rows: 42px 70px 72px 44px 26px;
      }

      .top,
      .mini-strip {
        -webkit-app-region: drag;
      }

      .top {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 7px 10px;
        border-bottom: 1px solid rgba(229, 221, 211, .72);
        background: rgba(255, 255, 255, .72);
      }

      .logo {
        width: 26px;
        height: 26px;
        object-fit: contain;
      }

      .title {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .title strong {
        overflow: hidden;
        color: var(--ink);
        font-size: 13px;
        font-weight: 760;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .state-pill {
        max-width: 82px;
        overflow: hidden;
        border: 1px solid rgba(78, 168, 103, .32);
        border-radius: 999px;
        background: #eef8f0;
        padding: 2px 7px;
        color: #2f7d45;
        font-size: 10px;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .window-actions,
      .mini-actions {
        display: flex;
        gap: 4px;
        -webkit-app-region: no-drag;
      }

      .icon-button {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        border-radius: 7px;
        color: var(--muted);
      }

      .icon-button:hover {
        background: #f1e8de;
        color: var(--ink);
      }

      .icon-button.close:hover {
        background: #fae2de;
        color: var(--error);
      }

      .process {
        min-width: 0;
        display: grid;
        grid-template-columns: 16px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        margin: 9px 10px 0;
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 9px 10px;
      }

      .process-copy {
        min-width: 0;
        display: grid;
        gap: 3px;
      }

      .process-heading {
        min-width: 0;
        display: flex;
        gap: 7px;
        align-items: center;
      }

      .process-label {
        min-width: 0;
        overflow: hidden;
        color: var(--ink);
        font-size: 16px;
        font-weight: 780;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .process-category {
        flex: 0 0 auto;
        border-radius: 999px;
        background: #f3ece4;
        padding: 2px 6px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        white-space: nowrap;
      }

      .process-detail {
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-list {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        padding: 8px 10px;
      }

      .status-row {
        min-width: 0;
        display: grid;
        grid-template-rows: 12px 16px 16px;
        align-items: center;
        justify-items: center;
        gap: 1px;
        border: 1px solid rgba(229, 221, 211, .88);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, .84);
        padding: 6px 4px 5px;
      }

      .status-row.ok {
        border-color: rgba(78, 168, 103, .28);
        background: #f4fbf5;
      }

      .status-row.warn {
        border-color: rgba(201, 146, 24, .28);
        background: #fff9eb;
      }

      .status-row.active {
        border-color: rgba(61, 124, 184, .26);
        background: #f0f7fc;
      }

      .status-row.bad {
        border-color: rgba(200, 77, 67, .28);
        background: #fff2ef;
      }

      .status-row .label {
        overflow: hidden;
        color: var(--body);
        font-size: 11px;
        font-weight: 760;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-row .value {
        max-width: 100%;
        overflow: hidden;
        color: var(--muted);
        font-size: 10px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .lamp {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #c8c1b8;
        box-shadow: 0 0 0 3px rgba(200, 193, 184, .16);
      }

      .process .lamp {
        width: 12px;
        height: 12px;
      }

      .lamp.ok {
        background: var(--success);
        box-shadow: 0 0 0 3px rgba(78, 168, 103, .18);
      }

      .lamp.warn {
        background: var(--warning);
        box-shadow: 0 0 0 3px rgba(201, 146, 24, .18);
      }

      .lamp.active {
        background: var(--active);
        box-shadow: 0 0 0 3px rgba(61, 124, 184, .18);
      }

      .lamp.bad {
        background: var(--error);
        box-shadow: 0 0 0 3px rgba(200, 77, 67, .18);
      }

      .command-bar {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        align-items: center;
        padding: 5px 10px;
      }

      .command-button {
        min-width: 0;
        height: 34px;
        overflow: hidden;
        border: 1px solid #dfd2c7;
        border-radius: 7px;
        background: var(--surface);
        padding: 0 8px;
        color: var(--body);
        font-weight: 720;
        text-overflow: ellipsis;
        white-space: nowrap;
        -webkit-app-region: no-drag;
      }

      .command-button:hover {
        border-color: var(--primary);
        background: #fff5ef;
        color: var(--primary-active);
      }

      .command-button.primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #fff;
      }

      .command-button.warn {
        border-color: #ecd498;
        background: #fff8e7;
        color: #8a6412;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        padding: 3px 10px 6px;
        color: var(--muted);
        font-size: 10px;
      }

      .meta {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mini-strip {
        display: none;
        height: 100%;
        grid-template-columns: 12px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 6px 8px 6px 10px;
        background: rgba(251, 250, 247, .98);
      }

      .mini-copy {
        min-width: 0;
        display: grid;
        gap: 1px;
      }

      .mini-title,
      .mini-subtitle {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mini-title {
        color: var(--ink);
        font-size: 12px;
        font-weight: 780;
      }

      .mini-subtitle {
        color: var(--muted);
        font-size: 10px;
      }

      body.mini .full {
        display: none;
      }

      body.mini .mini-strip {
        display: grid;
      }
    </style>
  </head>
  <body>
    <div class="window">
      <section class="full" aria-label="小店AI客服状态悬浮窗">
        <header class="top">
          <img class="logo" src="assets/logo.png" alt="">
          <div class="title">
            <strong>小店AI客服</strong>
            <span id="topState" class="state-pill">启动中</span>
          </div>
          <div class="window-actions">
            <button id="minimizeFloat" class="icon-button" type="button" title="最小化" aria-label="最小化">−</button>
            <button id="closeFloat" class="icon-button close" type="button" title="关闭悬浮窗" aria-label="关闭悬浮窗">×</button>
          </div>
        </header>

        <div class="process">
          <i id="runtimeLamp" class="lamp active"></i>
          <div class="process-copy">
            <div class="process-heading">
              <strong id="runtimeLabel" class="process-label">启动中</strong>
              <span id="runtimeCategory" class="process-category">系统</span>
            </div>
            <span id="runtimeDetail" class="process-detail">正在启动客服自动回复服务</span>
          </div>
        </div>

        <div class="status-list" aria-label="运行状态，仅供查看">
          <div id="aiCard" class="status-row">
            <i id="aiLamp" class="lamp"></i>
            <span class="label">AI API</span>
            <span id="aiText" class="value">检查中</span>
          </div>
          <div id="localCard" class="status-row">
            <i id="localLamp" class="lamp"></i>
            <span class="label">中转</span>
            <span id="localText" class="value">连接中</span>
          </div>
          <div id="scriptCard" class="status-row">
            <i id="scriptLamp" class="lamp"></i>
            <span class="label">脚本</span>
            <span id="scriptText" class="value">等待</span>
          </div>
          <div id="loginCard" class="status-row">
            <i id="loginLamp" class="lamp"></i>
            <span class="label">登录</span>
            <span id="loginText" class="value">检查中</span>
          </div>
        </div>

        <div class="command-bar" aria-label="可点击操作">
          <button id="openMain" class="command-button primary" type="button">打开控制台</button>
          <button id="toggleBot" class="command-button" type="button">暂停 Bot</button>
        </div>

        <footer class="footer">
          <span id="botMode" class="meta">Bot 正在接管</span>
          <span id="updatedAt" class="meta">状态刚刚更新</span>
          <span id="liveClock" class="meta">--:--:--</span>
        </footer>
      </section>

      <section class="mini-strip" aria-label="最小化小店AI客服状态">
        <i id="miniLamp" class="lamp"></i>
        <div class="mini-copy">
          <strong id="miniTitle" class="mini-title">启动中</strong>
          <span id="miniSubtitle" class="mini-subtitle">小店AI客服</span>
        </div>
        <div class="mini-actions">
          <button id="openMainMini" class="icon-button" type="button" title="打开控制台" aria-label="打开控制台">↗</button>
          <button id="expandFloat" class="icon-button" type="button" title="展开" aria-label="展开">□</button>
          <button id="closeMiniFloat" class="icon-button close" type="button" title="关闭悬浮窗" aria-label="关闭悬浮窗">×</button>
        </div>
      </section>
    </div>

    <script src="floating.js"></script>
  </body>
</html>
